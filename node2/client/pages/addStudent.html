

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>

        body{
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f4f4f4;
        }

        form{
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            width: 300px;
            display: flex;
            flex-direction: column;
            text-align: center;
            gap: 15px;
        }

        input{
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button{
            padding: 10px;
            border: none;
            background-color: green;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

    </style>
<body>
    <form action="">

        <h2>Add Student</h2>

        <input type="text" placeholder="Enter Name">
        <input type="number" placeholder="Enter Roll Number">
        <input type="text" placeholder="Enter Class">

        <button type="submit">Submit</button>
    </form>
</body>
</html>
